<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner Facial Elias</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        
        /* Estilos del menú */
        .menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .menu button { padding: 10px 15px; border-radius: 5px; border: none; background: #333; color: white; cursor: pointer; font-weight: bold; }
        .menu button:hover, .menu button.activo { background: #3b82f6; }

        /* Contenedores de secciones */
        .seccion { display: none; background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .seccion.activa { display: block; }

        .video-container { position: relative; display: inline-block; margin-top: 20px; border: 3px solid #3b82f6; border-radius: 15px; overflow: hidden; background: #000; width: 100%; max-width: 600px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        video { display: block; width: 100%; height: auto; }
        
        input { padding: 12px; margin: 5px; border-radius: 5px; border: 1px solid #333; background: #2d2d2d; color: white; width: 80%; max-width: 200px; }
        button.accion { padding: 12px 24px; border-radius: 5px; border: none; background: #10b981; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #status { margin-top: 10px; color: #3b82f6; font-weight: bold; }
        ul { list-style: none; padding: 0; text-align: left; max-width: 300px; margin: 0 auto; }
        li { background: #2d2d2d; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body>

    <h1>Escáner Facial Elias</h1>

    <div class="menu">
        <button id="btn-lista" onclick="cambiarSeccion('lista')">1. Lista Registradas</button>
        <button id="btn-registro" onclick="cambiarSeccion('registro')">2. Registrar Cara</button>
        <button id="btn-escanear" onclick="cambiarSeccion('escanear')">3. Escanear (Trasera)</button>
    </div>

    <div id="sec-lista" class="seccion">
        <h2>Personas Registradas</h2>
        <ul id="lista-caras">
            <li>Aún no hay caras registradas.</li>
        </ul>
    </div>

    <div id="sec-registro" class="seccion">
        <h2>Registrar Nuevo Rostro</h2>
        <input type="text" id="nombre" placeholder="Nombre (Elias)">
        <input type="text" id="apellido" placeholder="Apellido (Valle)">
        <input type="text" id="pais" placeholder="País (Argentina)">
        <br>
        <div style="margin-top: 15px;">
            <button onclick="encenderCamara('user')" style="background: #555; border:none; padding:8px; color:white; border-radius:4px;">Usar Frontal</button>
            <button onclick="encenderCamara('environment')" style="background: #555; border:none; padding:8px; color:white; border-radius:4px;">Usar Trasera</button>
        </div>
        <button class="accion" onclick="guardarPerfil()">GUARDAR ROSTRO</button>
    </div>

    <div id="sec-escanear" class="seccion">
        <h2>Escaneo en Vivo</h2>
        <p>Apunta la cámara a las personas para reconocerlas.</p>
        <button class="accion" onclick="encenderCamara('environment')" style="background:#3b82f6;">Activar Cámara Trasera</button>
    </div>

    <div id="status">Cargando inteligencia artificial...</div>

    <div class="video-container" id="container" style="display:none;">
        <video id="video" autoplay muted playsinline></video>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
</body>
</html>
